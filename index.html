<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nether Launcher | Beta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 30% 20%, #0a1a2a, #04080c);
            color: #d0e0f0;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 70% 80%, rgba(0, 100, 255, 0.05), transparent 60%),
                        radial-gradient(circle at 20% 40%, rgba(0, 150, 255, 0.03), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .launcher-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            background: rgba(12, 18, 28, 0.88);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 36px 40px 32px;
            border: 1px solid rgba(0, 120, 255, 0.15);
            box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(0, 100, 200, 0.1) inset;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo i {
            font-size: 2.4rem;
            color: #3b82f6;
            filter: drop-shadow(0 0 16px rgba(59,130,246,0.3));
        }
        .logo h1 {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo h1 span {
            font-size: 0.8rem;
            background: rgba(59,130,246,0.15);
            padding: 2px 14px;
            border-radius: 20px;
            -webkit-text-fill-color: #60a5fa;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .badge-beta {
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        .badge-beta i { font-size: 0.9rem; }

        .main-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 24px;
            padding: 24px 28px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 24px;
        }
        .main-panel h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #c0d8f0;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .main-panel h2 i { color: #3b82f6; }
        .warning {
            background: rgba(59,130,246,0.06);
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #8ab4f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .warning i { color: #3b82f6; font-size: 1.2rem; }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }
        .version-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #8ab4f0;
            text-decoration: none;
            display: block;
        }
        .version-card:hover {
            background: rgba(59,130,246,0.06);
            border-color: #3b82f6;
            transform: translateY(-3px);
            color: #d0e8ff;
        }
        .version-card.active {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
            box-shadow: 0 0 20px rgba(59,130,246,0.05);
        }
        .version-card .ver {
            font-weight: 700;
            font-size: 1rem;
            color: #c0d8f0;
        }
        .version-card .sub {
            font-size: 0.6rem;
            color: #6a8aaa;
            display: block;
            margin-top: 4px;
            font-weight: 500;
        }

        .btn-play {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 30px rgba(37,99,235,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            margin-top: 6px;
        }
        .btn-play::after {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .btn-play:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 40px rgba(37,99,235,0.5);
        }
        .btn-play:hover::after { opacity: 1; }
        .btn-play:active { transform: translateY(0px) scale(0.97); }
        .btn-play i { font-size: 1.4rem; color: #93bbfc; }

        .footer {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 0.7rem;
            color: #4a6a8a;
        }
        .footer .credit { display: flex; align-items: center; gap: 6px; }
        .footer .credit strong { color: #7a9aba; font-weight: 600; }
        .footer .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer .status .dot {
            width: 7px;
            height: 7px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        @media (max-width: 700px) {
            .launcher-container { padding: 24px 18px; }
            .logo h1 { font-size: 1.4rem; }
            .version-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 450px) {
            .version-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="launcher-container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-fire"></i>
                <h1>Nether <span>BETA</span></h1>
            </div>
            <div class="badge-beta"><i class="fas fa-flask"></i> Laboratório</div>
        </header>

        <div class="main-panel">
            <h2><i class="fas fa-history"></i> Versões Experimentais</h2>
            <div class="warning">
                <i class="fas fa-info-circle"></i>
                <span>Versões antigas e alternativas – algumas podem ser instáveis. Teste por sua conta!</span>
            </div>

            <div class="version-grid" id="versionGrid">
                <!-- Cards serão gerados via JS -->
            </div>

            <button class="btn-play" id="btnPlay">
                <i class="fas fa-play"></i> Jogar Agora
            </button>
        </div>

        <footer class="footer">
            <div class="credit"><i class="fas fa-flask"></i> Desenvolvido por <strong>Lopesz :)</strong></div>
            <div class="status"><span class="dot"></span> Beta Online</div>
        </footer>
    </div>

    <script>
        (function() {
            // Lista de versões com nomes de arquivos locais (organizados em pastas)
            const versions = [
                { id: 'indev', label: 'Indev', desc: 'Indev 20100223', file: 'versoes/indev/indev.html' },
                { id: 'infdev', label: 'Infdev', desc: 'Infdev', file: 'versoes/infdev/infdev.html' },
                { id: 'alpha_1.2.6', label: 'Alpha 1.2.6', desc: 'Alpha 1.2.6', file: 'versoes/alpha_1.2.6/alpha_1.2.6.html' },
                { id: 'beta_1.1', label: 'Beta 1.1', desc: 'Beta 1.1', file: 'versoes/beta_1.1/beta_1.1.html' },
                { id: 'beta_1.3', label: 'Beta 1.3', desc: 'Beta 1.3_01', file: 'versoes/beta_1.3/beta_1.3.html' },
                { id: 'beta_1.7.3', label: 'Beta 1.7.3', desc: 'Beta 1.7.3', file: 'versoes/beta_1.7.3/beta_1.7.3.html' },
                { id: '1.2.5', label: '1.2.5', desc: 'Release 1.2.5', file: 'versoes/1.2.5/1.2.5.html' },
                { id: '1.5.2', label: '1.5.2', desc: 'Release 1.5.2', file: 'versoes/1.5.2/1.5.2.html' },
                { id: '1.6.4', label: '1.6.4', desc: 'Release 1.6.4', file: 'versoes/1.6.4/1.6.4.html' },
                { id: '1.9', label: '1.9', desc: 'Release 1.9.4', file: 'versoes/1.9/1.9.html' },
                { id: 'classic_0.30', label: 'Classic 0.30', desc: 'Classic 0.30', file: 'versoes/classic_0.30/classic_0.30.html' }
            ];

            const grid = document.getElementById('versionGrid');
            const btnPlay = document.getElementById('btnPlay');

            let selectedVersion = null;

            // Carregar preferência salva
            const saved = localStorage.getItem('nether_beta_version');
            if (saved) {
                const found = versions.find(v => v.id === saved);
                if (found) selectedVersion = found;
            }

            // Renderizar cards
            versions.forEach((ver, index) => {
                const card = document.createElement('div');
                card.className = 'version-card' + (selectedVersion && selectedVersion.id === ver.id ? ' active' : '');
                if (!selectedVersion && index === 0) {
                    card.classList.add('active');
                    selectedVersion = ver;
                }
                card.dataset.id = ver.id;
                card.innerHTML = `
                    <span class="ver">${ver.label}</span>
                    <span class="sub">${ver.desc}</span>
                `;
                card.addEventListener('click', function() {
                    document.querySelectorAll('.version-card').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    const id = this.dataset.id;
                    selectedVersion = versions.find(v => v.id === id);
                    localStorage.setItem('nether_beta_version', selectedVersion.id);
                });
                grid.appendChild(card);
            });

            // Botão jogar
            btnPlay.addEventListener('click', function() {
                if (!selectedVersion) {
                    alert('Selecione uma versão primeiro!');
                    return;
                }
                // Abre o arquivo local
                const win = window.open(
                    selectedVersion.file,
                    '_blank',
                    'fullscreen=yes,scrollbars=no,resizable=yes,status=no,toolbar=no,menubar=no,location=no'
                );
                if (!win) {
                    alert('⚠️ Permita pop-ups para abrir o jogo.');
                } else {
                    try {
                        win.moveTo(0, 0);
                        win.resizeTo(screen.width, screen.height);
                    } catch(e) {}
                }
                console.log(`🚀 Abrindo: ${selectedVersion.label} -> ${selectedVersion.file}`);
            });

            console.log('🔵 Nether Beta carregado. Versão selecionada:', selectedVersion ? selectedVersion.label : 'nenhuma');
        })();
    </script>
</body>
</html>
